<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Orders')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: alerts}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h1 class="h4 mb-0">Order History</h1>
        <form class="d-flex gap-2" method="get" th:action="@{/orders/track}">
            <input class="form-control" name="orderId" placeholder="Track by Order ID">
            <button class="btn btn-outline-primary">Track</button>
        </form>
    </div>

    <form class="row g-2 mb-3" method="get" th:action="@{/orders}">
        <div class="col-md-3 col-lg-2">
            <select class="form-select" name="status">
                <option value="" th:selected="">All Status</option>
                <option value="PENDING" th:selected="">PENDING</option>
                <option value="CONFIRMED" th:selected="">CONFIRMED</option>
                <option value="DELIVERED" th:selected="">DELIVERED</option>
                <option value="CANCELLED" th:selected="">CANCELLED</option>
            </select>
        </div>
        <div class="col-md-3 col-lg-2">
            <select class="form-select" name="sortBy">
                <option value="dateDesc" th:selected="">Date New-Old</option>
                <option value="dateAsc" th:selected="">Date Old-New</option>
                <option value="totalHigh" th:selected="">Total High-Low</option>
                <option value="totalLow" th:selected="">Total Low-High</option>
                <option value="status" th:selected="">Status A-Z</option>
            </select>
        </div>
        <div class="col-md-3 col-lg-2">
            <select class="form-select" name="size">
                <option value="5" th:selected="">5 / page</option>
                <option value="8" th:selected="">8 / page</option>
                <option value="12" th:selected="">12 / page</option>
            </select>
        </div>
        <div class="col-md-3 col-lg-2 d-grid">
            <button class="btn btn-success">Apply</button>
        </div>
    </form>

    <p class="small text-muted">Showing <span th:text="">0</span> of <span th:text="">0</span> orders</p>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Type</th>
                <th>Status</th>
                <th>Items</th>
                <th>Total</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ">
                <td th:text=""></td>
                <td th:text=""></td>
                <td th:text=""></td>
                <td>
                    <span class="badge"
                          th:classappend=" ? ' text-bg-success' : ( ? ' text-bg-primary' : ( ? ' text-bg-danger' : ' text-bg-warning'))"
                          th:text=""></span>
                </td>
                <!-- Using getItemCount() from Order class (Encapsulation) -->
                <td th:text=""></td>
                <td>Rs. <span th:text=""></span></td>
                <td th:text=""></td>
                <td class="d-flex flex-wrap gap-1">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/orders/' + }">View</a>

                    <form th:if="" method="post" th:action="@{'/orders/status/' + }" class="d-flex gap-1">
                        <select class="form-select form-select-sm" name="status">
                            <option value="PENDING" th:selected="">PENDING</option>
                            <option value="CONFIRMED" th:selected="">CONFIRMED</option>
                            <option value="DELIVERED" th:selected="">DELIVERED</option>
                            <option value="CANCELLED" th:selected="">CANCELLED</option>
                        </select>
                        <button class="btn btn-sm btn-outline-success">Update</button>
                    </form>

                    <form th:if="" method="post" th:action="@{'/orders/cancel/' + }">
                        <button class="btn btn-sm btn-outline-danger">Cancel</button>
                    </form>
                </td>
            </tr>
            <tr th:if=""><td colspan="8" class="text-center text-muted">No orders found</td></tr>
            </tbody>
        </table>
    </div>

    <nav th:if="" aria-label="Orders pages">
        <ul class="pagination justify-content-center flex-wrap">
            <li class="page-item" th:classappend=" ? ' disabled'">
                <a class="page-link" th:href="@{/orders(page=,status=,sortBy=,size=)}">Previous</a>
            </li>
            <li class="page-item" th:each="pageNo : " th:classappend=" ? ' active'">
                <a class="page-link" th:text="" th:href="@{/orders(page=,status=,sortBy=,size=)}"></a>
            </li>
            <li class="page-item" th:classappend=" ? ' disabled'">
                <a class="page-link" th:href="@{/orders(page=,status=,sortBy=,size=)}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
